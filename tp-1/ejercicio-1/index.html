<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<title>Greeting</title>

<style>
    body{
        font-family: Arial;
        display: flex;
        justify-content: center;
        margin-top: 50px;
    }
</style>

</head>

<body>
    <x-greeting></x-greeting>
</body>

<script>

class Greeting extends HTMLElement
{
    constructor()
    {
        super();

        //los inputs
        this.inputName = document.createElement('input');
        this.inputName.type = 'text';
        this.inputName.placeholder = 'Ingresá tu nombre';

        this.inputSurname = document.createElement('input');
        this.inputSurname.type = 'text';
        this.inputSurname.placeholder = 'Ingresá tu apellido';

        //el boton de saludar
        this.btnGreet = document.createElement('button');
        this.btnGreet.innerText = 'Presione para saludar';

        //resultado
        this.result = document.createElement('p');      //p parrafo

        this.appendChild(this.inputName);
        this.appendChild(document.createElement('br'));
        this.appendChild(document.createElement('br'));
        this.appendChild(this.inputSurname)
        this.appendChild(document.createElement('br'));
        this.appendChild(document.createElement('br'));
        this.appendChild(this.btnGreet);
        this.appendChild(this.result);

    }

    onBtnGreetClick()
    {
        let name = this.inputName.value.trim();
        let surname = this.inputSurname.value.trim();

        if (name === '' || surname === '')
        {
            alert ('Ingrese nombre y apellido');
            return;
        }

        //apellido en mayuscula, nombre con primera letra en mayuscula
        let formattedSurname = surname.toUpperCase();
        let formattedName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

        this.result.innerText = `Buenos dias ${formattedSurname}, ${formattedName}!`;

    }

    connectedCallback()
    {
        this.btnGreet.onclick = this.onBtnGreetClick.bind(this);
    }

    disconnectedCallback()
    {
        this.btnGreet.onclick = null;
    }
}

customElements.define('x-greeting', Greeting);

</script>

</html>
