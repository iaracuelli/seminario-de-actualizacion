<!-- Extienda el WebComponent desarrollado en el punto anterior, y 
 agregue un botón que permita alternar la visualización de temperaturas de (ºC) a (ºF) y viceversa-->

<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="utf-8" />
<title>Clima</title>

<style>
    body 
    {
        font-family: Arial;
		display: flex;
		justify-content: center;
		margin-top: 50px;
    }
    table {
    border-collapse: collapse;
    }

    td {
        border: 1px solid black;
        padding: 5px;
        text-align: center;
    }

</style>
</head>

<body>
</body>
<script>

class Climate extends HTMLElement
{
    constructor()
    {
        super();
 
        this.tableContainer = document.createElement('div');
        this.table = document.createElement('table');


        this.tableContainer.appendChild(this.table);
        this.appendChild(this.tableContainer);

        this.rowHeader = document.createElement('tr');
        this.rowHeader.insertCell().innerText= 'Parámetros climáticos promedio de Mar del Plata, BA (1961 - 1990)';
        this.table.appendChild(this.rowHeader);

        this.tempData = {
            absMaxT: ['Temp. Máx. abs. (°C)', 42.4, 38.1, 36.3, 32.5, 27.4, 22.2, 27.7, 24.7, 28.8, 34.4, 35.7, 39.4, 39.4],
            avgMaxT: ['Temp. Máx. media (°C)', 26.3, 25.8, 23.7, 20.5, 16.8, 13.8, 13.1, 14.4, 16.0, 18.5, 21.7, 24.4, 19.6],
            avgT: ['Temp. media °C', 20.3, 19.9, 18.0, 14.6, 11.3, 8.5, 8.1, 8.9, 10.5, 13.1, 15.9, 18.5, 14.0],
            avgMinT: ['Temp. Mín. media (°C)', 14.3, 14.1, 12.5, 9.1, 6.4, 4.1, 3.8, 4.0, 5.3, 7.6, 10.1, 12.7, 8.7],
            absMinT: ['Temp. mín. abs. (°C)', 4.7, 1.2, 1.9, -1.0, -3.0, -5.5, -9.3, -6.4, -5.5, -3.0, -2.0, -0.2, -9.3]
        };

        //MESES
        this.rowMonths = document.createElement('tr');

        let monthsData = ['Mes', 'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre', 'Anual'];
        monthsData.forEach(value => this.rowMonths.insertCell().innerText = value);

        this.table.appendChild(this.rowMonths);


        //temperatura maxima absoluta
        this.rowAbsMaxT = document.createElement('tr');
        this.table.appendChild(this.rowAbsMaxT);


        //temperatura maxima media
        this.rowAvgMaxT = document.createElement('tr');
        this.table.appendChild(this.rowAvgMaxT);


        //temperatura media
        this.rowAvgT = document.createElement('tr');
        this.table.appendChild(this.rowAvgT);

        //temperatura minima media
        this.rowAvgMinT = document.createElement('tr');
        this.table.appendChild(this.rowAvgMinT);


        //temperatura minima absoluta
        this.rowAbsMinT = document.createElement('tr');
        this.table.appendChild(this.rowAbsMinT);

        
        //precipitacion total
        this.rowTotalPrecip = document.createElement('tr');

        let totalPrecip = ['Precipitación total (mm)', 100.1, 72.8, 107.0, 73.3, 73.5, 54.9, 58.9, 64.0, 56.4, 83.4, 75.3, 104.0, 923.6];
        totalPrecip.forEach(value => this.rowTotalPrecip.insertCell().innerText = value);

        this.table.appendChild(this.rowTotalPrecip);

        //dias de precipitacion
        this.rowPrecipDays = document.createElement('tr');

        let precipDays = ['Días de precipitaciones (≥ 0.1mm)', 9, 8, 9, 9, 9, 9, 9, 8, 7, 10, 10, 10, 107];
        precipDays.forEach(value => this.rowPrecipDays.insertCell().innerText = value);

        this.table.appendChild(this.rowPrecipDays);

        //horas de sol
        this.rowSun = document.createElement('tr');

        let sun = ['Horas de sol', 288.3, 234.5, 232.5, 195.0, 167.4, 120.0, 127.1, 164.3, 174.0, 210.8, 222.0, 269.7, 2405.6];
        sun.forEach(value => this.rowSun.insertCell().innerText = value);

        this.table.appendChild(this.rowSun);

        //humedad relativa
        this.rowHumidity = document.createElement('tr');

        let humidity = ['Humedad relativa (%)', 76, 77, 79, 81, 83, 84, 81, 81, 80, 80, 77, 76, 80];
        humidity.forEach(value => this.rowHumidity.insertCell().innerText = value);

        this.table.appendChild(this.rowHumidity);


        //boton 
        this.btnAverage = document.createElement('button');
        this.btnAverage.innerText = 'Traer Todos los Promedios.'

        this.tableContainer.appendChild(this.btnAverage);


        //FARENHEIT
        this.btnConvert = document.createElement('button');
        this.btnConvert.innerText = 'Ver en Fahrenheit (°F)';
        this.tableContainer.appendChild(this.btnConvert);

        //variable que me dice en que estamos
        this.isCelsius = true;      //arranca en °C

        this.renderTable('C');
       
    }

    getColor(value)
        {
            if (value >= 30) return '#d73027';      // rojo fuerte
            if (value >= 20) return '#f46d43';      // naranja
            if (value >= 10) return '#fdae61';      // amarillo naranja
            if (value >= 0)  return '#fee090';      // amarillo claro
            if (value >= -5)  return '#abd9e9';      // celeste
            return '#4575b4';                        // azul (negativos)
        }

    onBtnAverageClick()
    {
        alert(
        `Promedios anuales de temperaturas:
        Temp. Máx. abs: ${this.rowAbsMaxT.cells[13].innerText} °C
        Temp. Máx. media: ${this.rowAvgMaxT.cells[13].innerText} °C
        Temp. media: ${this.rowAvgT.cells[13].innerText} °C
        Temp. Mín. media: ${this.rowAvgMinT.cells[13].innerText} °C
        Temp. Mín. abs: ${this.rowAbsMinT.cells[13].innerText} °C
        `);
    }


    onBtnConvertClick()
    {
        if(this.isCelsius)
        {
            this.btnConvert.innerText = 'Ver en Celsius (°C)';
            this.isCelsius = false;
            this.renderTable('F');
        }
        else
        {
            this.btnConvert.innerText = 'Ver en Fahrenheit (°F)';
            this.isCelsius = true;
            this.renderTable('C');
        }
    }

    celsiusToFahrenheit(value)
    {
        return ((value * 9/5) + 32);
    }


    renderTable(unit)
    {
        
        this.renderRow(this.rowAbsMaxT, this.tempData.absMaxT, unit);
        this.renderRow(this.rowAvgMaxT, this.tempData.avgMaxT, unit);
        this.renderRow(this.rowAvgT, this.tempData.avgT, unit);
        this.renderRow(this.rowAvgMinT, this.tempData.avgMinT, unit);
        this.renderRow(this.rowAbsMinT, this.tempData.absMinT, unit);
    }

    renderRow(row, data, unit)
    {
        //limpio la fila
        row.innerHTML = '';

        //recorro  valores
        data.forEach((value,index) =>
        {
            let cell = row.insertCell();
            if (index === 0)
            {
                cell.innerText = value;     //el nombre de la fila
            }
            else
            {
                let converted = unit === 'F' ? this.celsiusToFahrenheit(value) : value;
                cell.innerText = converted.toFixed(1);
                cell.style.backgroundColor = this.getColor(value);      //siempre con valor en °C
            }
        });
    }
           

    connectedCallback()
        {
           this.btnAverage.onclick = this.onBtnAverageClick.bind(this);
           this.btnConvert.onclick = this.onBtnConvertClick.bind(this);
        }

    disconnectedCallback()
        {
           this.btnAverage.onclick = null;
           this.btnConvert.onclick = null;
        }
}
customElements.define('x-climate', Climate);

function main()
{
    let climate = new Climate();
    document.body.appendChild(climate);
}

window.onload = main;

</script>

</html>
