<!DOCTYPE html>
<html lang="en">


<head>
<meta charset="utf-8" />
<title>Sliders</title>

<style>
    body 
    {
        font-family: Arial;
		display: flex;
		justify-content: center;
		margin-top: 50px;
    }

    input[type="range"] 
    {
        writing-mode: vertical-lr;
        direction: rtl;
        height: 150px;
    }

    x-sliders 
    {
        display: flex;
        gap: 10px;
    }
    
    x-sliders > div 
    {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 60px;
    }

</style>
</head>

<body>
</body>
<script>

class Sliders extends HTMLElement
{
    constructor()
    {
    
        super();

         this.data = {};

       let frequencies = ['32Hz', '65Hz', '130Hz', '260Hz', '500Hz', '1k', '2k', '4k', '8.3k', '16.5k'];

       frequencies.forEach(freq =>
        {
            //el slider
           let slider = document.createElement('input');
           slider.type = 'range';
           slider.min = -12;
           slider.max = 12;
           slider.value = 0;

            //contenedor de cada banda
            let bandDiv = document.createElement('div');

            //etiqueta de arriba que tiene la frecuencia
            let label = document.createElement('p');
            label.innerText = freq;

            //etiqueta de abajo con el valor del slider
            let valueLabel = document.createElement('p');
            valueLabel.innerText = '+0dB';

            this.data[freq] =
            {
                value: 0,
                slider: slider,
                valueLabel: valueLabel
            };

            //meto todo al div
            bandDiv.appendChild(label);
            bandDiv.appendChild(slider);
            bandDiv.appendChild(valueLabel);

            // agrego el div al componente
            this.appendChild(bandDiv);
        });
    }


    getData()
    {
        return this.data;
    }

    setData(newData)
    {
        for(let freq in newData)
        {
            //actualizo valores en this.data
            this.data[freq].value = newData[freq];

            //mmover el slider
            this.data[freq].slider.value = newData[freq];

            //actualizo el texto de abajo
            if (newData[freq] >= 0)
            {
                this.data[freq].valueLabel.innerText = `+${newData[freq]}dB`;
            }
            else
            {
                this.data[freq].valueLabel.innerText = `${newData[freq]}dB`;
            }
        }
    }

    onSliderInput(freq)
    {
        let value = parseInt(this.data[freq].slider.value);
        this.data[freq].value = value;

        if (value >= 0)
        {
            this.data[freq].valueLabel.innerText = `+${value}dB`;
        }
        else
        {
            this.data[freq].valueLabel.innerText = `${value}dB`;
        }
    }

 connectedCallback()
        {
           for (let freq in this.data)
           {
            this.data[freq].slider.oninput = () => this.onSliderInput(freq);
           }
        }

    disconnectedCallback()
        {
           for (let freq in this.data)
           {
            this.data[freq].slider.oninput = null;
           }
        }
}
customElements.define('x-sliders', Sliders);

function main()
{
    let sliders = new Sliders();
    document.body.appendChild(sliders);
}

window.onload = main;

</script>

</html>
